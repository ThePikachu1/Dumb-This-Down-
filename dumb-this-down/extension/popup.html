<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dumb This Down</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        min-height: 140px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff8ee;
        color: #321614;
        padding: 18px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #efdcc6;
      }

      header h1 {
        font-size: 16px;
        font-weight: 800;
        color: #a71318;
        letter-spacing: 0;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
        padding: 10px 0 12px;
        border-bottom: 1px solid #efdcc6;
      }

      .toggle-copy {
        display: grid;
        gap: 2px;
      }

      .toggle-copy strong {
        color: #321614;
        font-size: 13px;
      }

      #button-toggle-label {
        color: #7a4a40;
        font-size: 12px;
      }

      .switch {
        position: relative;
        display: inline-block;
        flex: 0 0 auto;
        width: 46px;
        height: 26px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #ecd7c0;
        border-radius: 999px;
        cursor: pointer;
        transition: background-color 0.18s ease;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        left: 3px;
        top: 3px;
        background: #fffdf7;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(70, 10, 14, 0.18);
        transition: transform 0.18s ease;
      }

      .switch input:checked + .slider {
        background: #c1121f;
      }

      .switch input:checked + .slider::before {
        transform: translateX(20px);
      }

      #status-area {
        font-size: 13px;
        line-height: 1.6;
        color: #5a332d;
      }

      #status-area.loading {
        color: #8a4d3f;
        font-style: italic;
      }

      #status-area.error {
        color: #a71318;
        font-weight: 650;
      }

      #result-text {
        background: #fffdf7;
        border: 1px solid #efdcc6;
        border-radius: 8px;
        padding: 12px;
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.65;
        color: #321614;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      #copy-btn {
        display: none;
        margin-top: 10px;
        width: 100%;
        padding: 10px 12px;
        background: linear-gradient(145deg, #d7332f 0%, #a71318 58%, #7b090d 100%);
        color: #fffdf7;
        border: 1px solid rgba(112, 12, 16, 0.62);
        border-radius: 6px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 244, 225, 0.55),
          0 6px 14px rgba(87, 18, 16, 0.2);
      }

      #copy-btn:hover {
        filter: saturate(1.08) brightness(1.03);
      }

      #copy-btn.copied {
        background: #7f1d18;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Dumb This Down</h1>
    </header>

    <div class="toggle-row">
      <div class="toggle-copy">
        <strong>Page button</strong>
        <span id="button-toggle-label">Enabled</span>
      </div>
      <label class="switch" aria-label="Enable red button on pages">
        <input id="button-toggle" type="checkbox" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div id="status-area">
      Highlight text on the page and click <strong>Dumb It Down</strong>.
    </div>

    <div id="result-text" style="display: none"></div>
    <button id="copy-btn">Copy to Clipboard</button>

    <script src="popup.js"></script>
  </body>
</html>
